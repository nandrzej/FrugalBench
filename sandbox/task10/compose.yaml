services:
  default:
    build:
      context: ../..
      dockerfile: sandbox/task10/Dockerfile
    command: tail -f /dev/null
    init: true
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /workspace:size=256M,mode=1777
    cap_drop:
      - ALL
    mem_limit: 512M
    cpus: "1"
    ulimits:
      nproc: 64
      nofile:
        soft: 128
        hard: 256
