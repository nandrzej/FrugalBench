services:
  default:
    build:
      context: ../..
      dockerfile: sandbox/task2/Dockerfile
    command: tail -f /dev/null
    init: true
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
